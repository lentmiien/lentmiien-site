<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-labelledby="title desc">
  <title id="title">Minute logger admin tile illustration</title>
  <desc id="desc">A graphite request log dashboard with glowing minute blocks, location pins, and activity rows.</desc>
  <defs>
    <linearGradient id="minuteLoggerBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E0F13"/>
      <stop offset="56%" stop-color="#171A20"/>
      <stop offset="100%" stop-color="#20242A"/>
    </linearGradient>
    <linearGradient id="minuteLoggerSpark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFC247"/>
      <stop offset="100%" stop-color="#FF6A1F"/>
    </linearGradient>
    <linearGradient id="minuteLoggerMap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#19E3E3"/>
      <stop offset="100%" stop-color="#17C696"/>
    </linearGradient>
    <filter id="minuteLoggerGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1 0 0.56 0 0 0.42 0 0 0.12 0 0.18 0 0 0 0.76 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect width="640" height="400" fill="url(#minuteLoggerBg)"/>
  <circle cx="96" cy="78" r="86" fill="#FFC247" fill-opacity="0.1"/>
  <circle cx="540" cy="318" r="122" fill="#FF6A1F" fill-opacity="0.11"/>
  <path d="M70 296c66-50 126-61 180-32 42 22 82 20 120-4 62-39 128-26 198 42" fill="none" stroke="#2B313C" stroke-width="4"/>

  <rect x="96" y="72" width="448" height="256" rx="30" fill="#171A20" stroke="#262B34" stroke-width="4"/>
  <rect x="122" y="98" width="396" height="204" rx="20" fill="#1B2026" stroke="#2B313C" stroke-width="2"/>

  <g transform="translate(152 122)">
    <rect x="0" y="0" width="180" height="156" rx="22" fill="#0E0F13" stroke="#262B34" stroke-width="3"/>
    <path d="M24 116c26-34 48-44 72-30 22 13 36 10 52-10 11-14 22-22 32-25" fill="none" stroke="#2B313C" stroke-width="20" stroke-linecap="round"/>
    <path d="M24 116c26-34 48-44 72-30 22 13 36 10 52-10 11-14 22-22 32-25" fill="none" stroke="url(#minuteLoggerMap)" stroke-width="9" stroke-linecap="round" filter="url(#minuteLoggerGlow)"/>
    <g stroke="#262B34" stroke-width="3">
      <path d="M0 52h180"/>
      <path d="M0 104h180"/>
      <path d="M60 0v156"/>
      <path d="M120 0v156"/>
    </g>
    <g>
      <path d="M54 44c0-19 15-34 34-34s34 15 34 34c0 28-34 62-34 62S54 72 54 44Z" fill="url(#minuteLoggerSpark)" filter="url(#minuteLoggerGlow)"/>
      <circle cx="88" cy="44" r="12" fill="#0E0F13"/>
      <circle cx="88" cy="44" r="5" fill="#FFC247"/>
    </g>
    <circle cx="148" cy="74" r="10" fill="#17C696"/>
    <circle cx="28" cy="118" r="9" fill="#19E3E3"/>
  </g>

  <g transform="translate(362 118)">
    <rect x="0" y="0" width="122" height="34" rx="17" fill="#20242A" stroke="#FFC247" stroke-opacity="0.38" stroke-width="2"/>
    <circle cx="22" cy="17" r="7" fill="#17C696"/>
    <rect x="40" y="12" width="58" height="10" rx="5" fill="#FFC247"/>

    <g transform="translate(0 58)">
      <rect x="0" y="0" width="132" height="124" rx="18" fill="#0E0F13" stroke="#262B34" stroke-width="3"/>
      <g fill="#20242A">
        <rect x="16" y="18" width="100" height="18" rx="9"/>
        <rect x="16" y="52" width="100" height="18" rx="9"/>
        <rect x="16" y="86" width="100" height="18" rx="9"/>
      </g>
      <g stroke-linecap="round">
        <path d="M30 27h38" stroke="#FFC247" stroke-width="7"/>
        <path d="M30 61h62" stroke="#FF6A1F" stroke-width="7"/>
        <path d="M30 95h48" stroke="#19E3E3" stroke-width="7"/>
      </g>
      <g fill="#C1C7D3" fill-opacity="0.72">
        <circle cx="98" cy="27" r="5"/>
        <circle cx="98" cy="61" r="5"/>
        <circle cx="98" cy="95" r="5"/>
      </g>
    </g>
  </g>

  <g transform="translate(148 286)">
    <rect x="0" y="0" width="344" height="18" rx="9" fill="#20242A" stroke="#2B313C" stroke-width="2"/>
    <rect x="12" y="5" width="50" height="8" rx="4" fill="#FFC247"/>
    <rect x="76" y="5" width="88" height="8" rx="4" fill="#FF6A1F"/>
    <rect x="178" y="5" width="58" height="8" rx="4" fill="#17C696"/>
    <rect x="250" y="5" width="68" height="8" rx="4" fill="#19E3E3"/>
  </g>

  <g transform="translate(140 112)" fill="#20242A" stroke="#FFC247" stroke-opacity="0.42" stroke-width="2">
    <rect x="0" y="0" width="58" height="26" rx="13"/>
    <rect x="338" y="156" width="58" height="26" rx="13"/>
  </g>
  <path d="M150 125h22M488 281h22" stroke="#FFC247" stroke-width="6" stroke-linecap="round"/>
  <circle cx="184" cy="125" r="5" fill="#FF6A1F"/>
  <circle cx="522" cy="281" r="5" fill="#17C696"/>
</svg>
