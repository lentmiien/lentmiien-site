<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-labelledby="title desc">
  <title id="title">Qwen3 LoRA admin tool tile illustration</title>
  <desc id="desc">A graphite AI chip training a glowing LoRA adapter with amber and ember signal paths.</desc>
  <defs>
    <linearGradient id="qwenBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E0F13"/>
      <stop offset="55%" stop-color="#171A20"/>
      <stop offset="100%" stop-color="#20242A"/>
    </linearGradient>
    <linearGradient id="qwenChip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#20242A"/>
      <stop offset="100%" stop-color="#1B2026"/>
    </linearGradient>
    <linearGradient id="qwenSpark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFC247"/>
      <stop offset="100%" stop-color="#FF6A1F"/>
    </linearGradient>
    <filter id="qwenGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1 0 0.58 0 0 0.55 0 0 0.18 0 0.12 0 0 0 0.8 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

