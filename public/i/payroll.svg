<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-labelledby="title desc">
  <title id="title">Payroll tile illustration</title>
  <desc id="desc">Payslip document with bars and salary coin.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141A22"/>
      <stop offset="100%" stop-color="#1F2731"/>
    </linearGradient>
    <linearGradient id="sheet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4DCBA"/>
      <stop offset="100%" stop-color="#E0BE8A"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" fill="url(#bg)"/>

  <rect x="140" y="60" width="274" height="280" rx="18" fill="url(#sheet)"/>
  <rect x="162" y="86" width="230" height="28" rx="8" fill="#E05F1C"/>
  <rect x="162" y="128" width="122" height="10" rx="5" fill="#956431"/>
  <rect x="162" y="150" width="190" height="8" rx="4" fill="#956431" fill-opacity="0.72"/>
  <rect x="162" y="174" width="174" height="8" rx="4" fill="#956431" fill-opacity="0.62"/>

  <rect x="162" y="204" width="40" height="82" rx="8" fill="#FF6A1F"/>
  <rect x="214" y="184" width="40" height="102" rx="8" fill="#FFC247"/>
  <rect x="266" y="222" width="40" height="64" rx="8" fill="#2F8F83"/>
  <rect x="318" y="162" width="40" height="124" rx="8" fill="#FFB84E"/>

  <g transform="translate(452 190)">
    <circle cx="0" cy="0" r="72" fill="#FF6A1F"/>
    <circle cx="0" cy="0" r="54" fill="#FFC247"/>
    <text x="0" y="14" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="64" font-weight="700" fill="#1B2026">$</text>
  </g>
</svg>
