<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-labelledby="title desc">
  <title id="title">Chat 5 tile illustration</title>
  <desc id="desc">Layered chat bubbles with a small five badge.</desc>
  <defs>
