      <stop offset="100%" stop-color="#20242A"/>
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7C3B"/>
      <stop offset="100%" stop-color="#E05F1C"/>
    </linearGradient>
  </defs>

  <rect width="640" height="400" fill="url(#bgGrad)"/>
  <circle cx="540" cy="82" r="86" fill="#FF6A1F" fill-opacity="0.14"/>
  <circle cx="96" cy="332" r="108" fill="#FFC247" fill-opacity="0.09"/>

  <g transform="translate(140 94)">
    <rect x="0" y="18" width="246" height="146" rx="24" fill="#2A2F38" stroke="#FFC247" stroke-opacity="0.25" stroke-width="2"/>
    <path d="M42 164l-2 34 42-34z" fill="#2A2F38"/>
    <rect x="38" y="58" width="160" height="11" rx="5.5" fill="#FFC247" fill-opacity="0.8"/>
    <rect x="38" y="82" width="144" height="10" rx="5" fill="#FFC247" fill-opacity="0.62"/>
    <rect x="38" y="104" width="124" height="10" rx="5" fill="#FFC247" fill-opacity="0.48"/>
  </g>

