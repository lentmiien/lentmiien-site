<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-labelledby="title desc">
  <title id="title">Request counter tile illustration</title>
  <desc id="desc">A graphite monitoring panel with a glowing minute gauge and request activity bars.</desc>
  <defs>
    <linearGradient id="requestCounterBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E0F13"/>
      <stop offset="58%" stop-color="#171A20"/>
      <stop offset="100%" stop-color="#20242A"/>
    </linearGradient>
    <linearGradient id="requestCounterSpark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFC247"/>
      <stop offset="100%" stop-color="#FF6A1F"/>
    </linearGradient>
    <filter id="requestCounterGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1 0 0.55 0 0 0.42 0 0 0.12 0 0.18 0 0 0 0.8 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect width="640" height="400" fill="url(#requestCounterBg)"/>
  <circle cx="104" cy="80" r="86" fill="#FFC247" fill-opacity="0.1"/>
  <circle cx="536" cy="318" r="122" fill="#FF6A1F" fill-opacity="0.1"/>
  <path d="M70 302c68-54 128-70 180-48 46 20 88 20 126 0 58-31 120-19 194 36" fill="none" stroke="#2B313C" stroke-width="4"/>

  <rect x="104" y="70" width="432" height="260" rx="30" fill="#171A20" stroke="#262B34" stroke-width="4"/>
  <rect x="128" y="96" width="384" height="208" rx="20" fill="#1B2026" stroke="#2B313C" stroke-width="2"/>

  <g transform="translate(178 132)">
    <circle cx="94" cy="94" r="70" fill="#0E0F13" stroke="#262B34" stroke-width="10"/>
    <path d="M37 94a57 57 0 1 1 114 0" fill="none" stroke="#2B313C" stroke-width="14" stroke-linecap="round"/>
    <path d="M37 94a57 57 0 0 1 96-42" fill="none" stroke="url(#requestCounterSpark)" stroke-width="14" stroke-linecap="round" filter="url(#requestCounterGlow)"/>
    <path d="M94 94l35-36" stroke="#FFC247" stroke-width="8" stroke-linecap="round"/>
    <circle cx="94" cy="94" r="10" fill="#FF6A1F"/>
    <g stroke="#C1C7D3" stroke-opacity="0.72" stroke-width="4" stroke-linecap="round">
      <path d="M94 27v12"/>
      <path d="M134 44l-8 10"/>
      <path d="M151 94h-12"/>
      <path d="M54 44l8 10"/>
      <path d="M37 94h12"/>
    </g>
  </g>

  <g transform="translate(360 126)">
    <rect x="0" y="0" width="116" height="32" rx="16" fill="#20242A" stroke="#FFC247" stroke-opacity="0.36" stroke-width="2"/>
    <circle cx="24" cy="16" r="7" fill="#17C696"/>
    <rect x="42" y="11" width="50" height="10" rx="5" fill="#FFC247"/>

    <rect x="0" y="56" width="24" height="90" rx="8" fill="#FF6A1F"/>
    <rect x="36" y="82" width="24" height="64" rx="8" fill="#FFC247"/>
    <rect x="72" y="36" width="24" height="110" rx="8" fill="#17C696"/>
    <rect x="108" y="68" width="24" height="78" rx="8" fill="#19E3E3"/>
    <path d="M0 160h132" stroke="#2B313C" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g fill="#20242A" stroke="#FFC247" stroke-opacity="0.42" stroke-width="2">
    <rect x="144" y="112" width="58" height="26" rx="13"/>
    <rect x="438" y="248" width="58" height="26" rx="13"/>
  </g>
  <path d="M154 125h24M448 261h24" stroke="#FFC247" stroke-width="6" stroke-linecap="round"/>
  <circle cx="188" cy="125" r="5" fill="#FF6A1F"/>
  <circle cx="482" cy="261" r="5" fill="#17C696"/>
</svg>
