<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-labelledby="title desc">
  <title id="title">Video generation tile illustration</title>
  <desc id="desc">Clapper board and play button.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141A22"/>
      <stop offset="100%" stop-color="#232B36"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7C3B"/>
      <stop offset="100%" stop-color="#E05F1C"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" fill="url(#bg)"/>

  <g transform="translate(124 92)">
    <rect x="0" y="52" width="392" height="196" rx="20" fill="#1D232D" stroke="#FFC247" stroke-opacity="0.35" stroke-width="3"/>
    <rect x="0" y="0" width="392" height="72" rx="16" fill="url(#panel)"/>

    <g fill="#FFC247" fill-opacity="0.9">
      <rect x="24" y="12" width="44" height="48" transform="skewX(-28)"/>
      <rect x="96" y="12" width="44" height="48" transform="skewX(-28)"/>
      <rect x="168" y="12" width="44" height="48" transform="skewX(-28)"/>
      <rect x="240" y="12" width="44" height="48" transform="skewX(-28)"/>
      <rect x="312" y="12" width="44" height="48" transform="skewX(-28)"/>
    </g>

    <circle cx="196" cy="150" r="60" fill="#2A313D" stroke="#FFC247" stroke-width="4"/>
    <path d="M178 118l42 32-42 32z" fill="#FF6A1F"/>

    <rect x="32" y="226" width="110" height="10" rx="5" fill="#FFC247" fill-opacity="0.65"/>
