    <path d="M48 26h28M48 46h20" stroke="#FFC247" stroke-width="7" stroke-linecap="round"/>
  </g>

  <g transform="translate(274 142)">
    <rect x="0" y="0" width="110" height="106" rx="24" fill="#0E0F13" stroke="#FFC247" stroke-width="4"/>
    <path d="M35 62c0-19 12-34 28-34 15 0 27 15 27 34s-12 34-27 34c-16 0-28-15-28-34Z" fill="#20242A"/>
    <path d="M32 58h60M42 36c10 12 10 39 0 52M82 36c-10 12-10 39 0 52" fill="none" stroke="#FFC247" stroke-width="6" stroke-linecap="round"/>
    <circle cx="55" cy="62" r="8" fill="#FF6A1F"/>
