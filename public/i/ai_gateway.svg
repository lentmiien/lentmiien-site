  <rect x="122" y="98" width="396" height="204" rx="20" fill="#1B2026" stroke="#2B313C" stroke-width="2"/>

  <g transform="translate(168 132)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M36 112h96l56-56h78" fill="none" stroke="#2B313C" stroke-width="16"/>
    <path d="M36 112h96l56-56h78" fill="none" stroke="url(#aiGatewaySpark)" stroke-width="8" filter="url(#aiGatewayGlow)"/>
    <path d="M132 112l56 56h78" fill="none" stroke="#2B313C" stroke-width="16"/>
    <path d="M132 112l56 56h78" fill="none" stroke="#19E3E3" stroke-width="8" opacity="0.86"/>
  </g>

  <g transform="translate(140 176)">
