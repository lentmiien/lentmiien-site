<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-labelledby="title desc">
  <title id="title">AI Gateway admin tile illustration</title>
  <desc id="desc">A graphite gateway console routing AI traffic through glowing ember and amber nodes.</desc>
  <defs>
    <linearGradient id="aiGatewayBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E0F13"/>
      <stop offset="56%" stop-color="#171A20"/>
      <stop offset="100%" stop-color="#20242A"/>
    </linearGradient>
    <linearGradient id="aiGatewaySpark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFC247"/>
      <stop offset="100%" stop-color="#FF6A1F"/>
    </linearGradient>
    <filter id="aiGatewayGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1 0 0.58 0 0 0.48 0 0 0.16 0 0.18 0 0 0 0.78 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect width="640" height="400" fill="url(#aiGatewayBg)"/>
  <circle cx="96" cy="80" r="86" fill="#FFC247" fill-opacity="0.1"/>
  <circle cx="532" cy="318" r="124" fill="#FF6A1F" fill-opacity="0.11"/>
  <path d="M72 286c72-48 135-58 190-30 44 23 84 23 120 0 58-36 118-25 182 34" fill="none" stroke="#2B313C" stroke-width="4"/>

