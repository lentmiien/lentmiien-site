      <stop offset="0%" stop-color="#171A20"/>
      <stop offset="100%" stop-color="#20242A"/>
    </linearGradient>
    <linearGradient id="pdfGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF7C3B"/>
      <stop offset="100%" stop-color="#E05F1C"/>
    </linearGradient>
  </defs>

  <rect width="640" height="400" fill="url(#bgGrad)"/>
  <circle cx="112" cy="70" r="86" fill="#FFC247" fill-opacity="0.12"/>
  <circle cx="544" cy="336" r="112" fill="#FF6A1F" fill-opacity="0.1"/>

