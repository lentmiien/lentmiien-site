<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-labelledby="title desc">
  <title id="title">PDF to image tile illustration</title>
  <desc id="desc">A PDF document converting into an image frame.</desc>
  <defs>
