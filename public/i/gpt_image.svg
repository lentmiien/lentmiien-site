<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-labelledby="title desc">
  <title id="title">GPT Image tile illustration</title>
  <desc id="desc">A prompt card pointing toward a generated landscape with sparkles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141A22"/>
      <stop offset="100%" stop-color="#222B37"/>
    </linearGradient>
    <linearGradient id="image" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#2F8F83"/>
      <stop offset="100%" stop-color="#FFC247"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFC247"/>
      <stop offset="100%" stop-color="#FF6A1F"/>
    </linearGradient>
  </defs>

  <rect width="640" height="400" fill="url(#bg)"/>
  <circle cx="532" cy="72" r="96" fill="#FFC247" fill-opacity="0.08"/>

  <g transform="translate(66 116)">
