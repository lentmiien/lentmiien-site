    <rect x="24" y="58" width="170" height="9" rx="4.5" fill="#697483"/>
    <rect x="24" y="80" width="146" height="9" rx="4.5" fill="#697483"/>
    <rect x="24" y="102" width="116" height="9" rx="4.5" fill="#697483"/>
    <rect x="24" y="130" width="76" height="18" rx="9" fill="#FF6A1F"/>
  </g>

  <path d="M304 200h42" fill="none" stroke="#FFB84E" stroke-width="9" stroke-linecap="round"/>
  <path d="M334 184l18 16-18 16" fill="none" stroke="#FFB84E" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>

