<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="refresh" content="0; url=/learning/topic/chemistry" />
  <title>Mini Chem Quest moved</title>
  <style>
    :root {
      --bgA: #081225;
      --bgB: #0b2a42;
      --card: rgba(255,255,255,0.94);
      --ink: #0b1220;
      --accent: #ffb703;
      --shadow: 0 18px 45px rgba(0,0,0,0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1100px 700px at 15% 10%, rgba(56,189,248,0.25), transparent 60%),
        radial-gradient(900px 700px at 80% 20%, rgba(167,139,250,0.22), transparent 60%),
        linear-gradient(160deg, var(--bgA), var(--bgB));
    }

    .card {
      width: min(100%, 560px);
      background: var(--card);
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .icon {
      font-size: 56px;
      line-height: 1;
    }

    h1 {
      margin: 16px 0 10px;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
    }

    p {
      margin: 10px 0;
      font-size: 1.05rem;
      line-height: 1.5;
    }

    .hint {
      color: rgba(15, 23, 42, 0.72);
      font-size: 0.95rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
      padding: 12px 18px;
      border-radius: 999px;
      background: var(--accent);
      color: var(--ink);
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 12px 22px rgba(0,0,0,0.14);
    }
  </style>
  <script>
    window.location.replace('/learning/topic/chemistry');
  </script>
</head>
<body>
  <main class="card">
    <div class="icon" aria-hidden="true">🧪</div>
    <h1>Mini Chem Quest moved</h1>
    <p>The old chemistry prototype now lives inside the new Learning Lab.</p>
    <p class="hint">If you are not signed in yet, the app may ask you to log in first.</p>
    <a class="btn" href="/learning/topic/chemistry">Open Learning Lab</a>
  </main>
</body>
</html>
